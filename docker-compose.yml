version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: gigabet_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: bettingdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: gigabet_redis
    restart: always
    ports:
      - "6379:6379"

  ai-service:
    build: ./ai-service
    container_name: gigabet_ai_service
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD}@db:5432/bettingdb
    depends_on:
      - db
      - redis
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]

  data-service:
    build: ./data-service
    container_name: gigabet_data_service
    restart: always
    environment:
      - API_FOOTBALL_KEY=${API_FOOTBALL_KEY}
      - THE_ODDS_API_KEY=${THE_ODDS_API_KEY}
      - THE_ODDS_API_KEYS=${THE_ODDS_API_KEYS:-${THE_ODDS_API_KEY}}
      - PANDASCORE_API_KEY=${PANDASCORE_API_KEY}
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD}@db:5432/bettingdb
    depends_on:
      - db

  analysis-service:
    build: ./analysis-service
    container_name: gigabet_analysis_service
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD}@db:5432/bettingdb
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - AI_SERVICE_URL=http://ai-service:8000
    depends_on:
      - db
      - ai-service

volumes:
  pgdata:
